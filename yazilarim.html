<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yazılarım - Burak Elmas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav>
            <div class="logo">Burak Elmas <span class="logo-sub">- Kişisel Blog</span></div>
            <ul class="menu">
                <li><a href="index.html">Anasayfa</a></li>
                <li><a href="oyunlar.html">Oyunlar</a></li>
                <li><a href="kodlama.html">Kodlama</a></li>
                <li><a href="yazilarim.html" class="active">Yazılarım</a></li>
                <li><a href="bilisim-deposu.html">Bilişim Deposu</a></li>
                <li><a href="iletisim.html">İletişim</a></li>
                <li><button id="theme-toggle" class="theme-btn" title="Temayı Değiştir">🌙</button></li>
            </ul>
        </nav>
    </header>

    <main class="construction-main">
        <div class="construction-container">
            <div class="construction-icon">🚧</div>
            <h1>Yapım Aşamasında</h1>
            <p>Bu sayfa üzerinde çalışmalarım devam ediyor. Çok yakında yeni yazılarımla burada olacağım!</p>
            <a href="index.html" class="back-btn">&larr; Anasayfaya Dön</a>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Burak Elmas. Tüm hakları saklıdır.</p>
    </footer>

    <script>
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;

        if (localStorage.getItem('theme') === 'dark') {
            body.classList.add('dark-mode');
            themeToggle.innerHTML = '☀️';
        }

        themeToggle.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            if (body.classList.contains('dark-mode')) {
                localStorage.setItem('theme', 'dark');
                themeToggle.innerHTML = '☀️';
            } else {
                localStorage.setItem('theme', 'light');
                themeToggle.innerHTML = '🌙';
            }
        });
    </script>

</body>
</html>
