<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burak Elmas - Kişisel Blog</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav>
            <a href="index.html" class="logo">Burak Elmas <span class="logo-sub">- Kişisel Blog</span></a>
            
            <ul class="menu">
                <li><a href="index.html" class="active">Anasayfa</a></li>
                <li><a href="oyunlar.html">Oyunlar</a></li>
                <li><a href="kodlama.html">Kodlama</a></li>
                <li><a href="yazilarim.html">Yazılarım</a></li>
                <li><a href="bilisim-deposu.html">Bilişim Deposu</a></li>
                <li><a href="iletisim.html">İletişim</a></li>
                <li><button id="theme-toggle" class="theme-btn" title="Temayı Değiştir">🌙</button></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>Fikirler, Kodlar ve Dijital Dünya</h1>
            <p>Teknoloji, eğitim ve hayata dair notlar.</p>
        </section>

        <section class="latest-posts">
            <div class="section-header">
                <h2>Son Yazılar</h2>
            </div>
            
            <div id="yazilar-alani" class="article-list">
                <p style="text-align: center; color: #888; padding: 40px 0;">Yazılar veritabanından yükleniyor...</p>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Burak Elmas. Tüm hakları saklıdır.</p>
        <div class="visitor-counter" title="Toplam Görüntülenme">
            <span>👁️</span> <span id="visit-count">...</span>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // --- KARANLIK MOD AYARLARI ---
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;
        
        if (localStorage.getItem('theme') === 'dark') {
            body.classList.add('dark-mode');
            themeToggle.innerHTML = '☀️';
        }

        themeToggle.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            if (body.classList.contains('dark-mode')) {
                localStorage.setItem('theme', 'dark');
                themeToggle.innerHTML = '☀️';
            } else {
                localStorage.setItem('theme', 'light');
                themeToggle.innerHTML = '🌙';
            }
        });

        // --- ZİYARETÇİ SAYACI ---
        const visitCountElement = document.getElementById('visit-count');
        fetch('https://api.counterapi.dev/v1/burakelmasblog/anasayfa')
            .then(response => response.json())
            .then(data => {
                visitCountElement.innerText = data.count;
            })
            .catch(() => {
                visitCountElement.innerText = "1.204"; // Hata durumunda varsayılan
            });


        // --- SUPABASE VERİTABANI BAĞLANTISI ---
        
        // DİKKAT: Aşağıdaki iki tırnak içine kendi Supabase URL ve API Anahtarını yapıştırmalısın!
        const SUPABASE_URL = 'https://jezeawglyqfviucpektp.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImplemVhd2dseXFmdml1Y3Bla3RwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMDc1MTgsImV4cCI6MjA4OTg4MzUxOH0.Khihqp-nDIPBeH1U3SDHF_95O8SWzBEU4c-h3LZ05tc';
      

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function yazilariGetir() {
            const yazilarAlani = document.getElementById('yazilar-alani');

            try {
                // En güncel 3 yazıyı veritabanından çek
                const { data, error } = await supabaseClient
                    .from('yazilar')
                    .select('*')
                    .order('id', { ascending: false })
                    .limit(3);

                if (error) throw error;

                yazilarAlani.innerHTML = ''; // Yükleniyor yazısını temizle

                if (data.length === 0) {
                    yazilarAlani.innerHTML = '<p style="text-align: center; color: var(--text-muted);">Henüz yazı eklenmemiş.</p>';
                    return;
                }

                // Gelen her veriyi HTML olarak ekrana bas
                data.forEach(yazi => {
                    const articleHTML = `
                        <article class="article-card">
                            <div class="article-thumb">
                                <img src="${yazi.resim_url}" alt="${yazi.baslik}">
                            </div>
                            <div class="article-content">
                                <span class="post-date">${yazi.tarih} • ${yazi.kategori}</span>
                                <h3><a href="icerik.html?id=${yazi.id}">${yazi.baslik}</a></h3>
                                <p class="post-excerpt">${yazi.ozet}</p>
                                <a href="icerik.html?id=${yazi.id}" class="read-more">Devamını Oku &rarr;</a>
                            </div>
                        </article>
                    `;
                    yazilarAlani.innerHTML += articleHTML;
                });

            } catch (hata) {
                console.error("Yazılar çekilirken hata oluştu:", hata.message);
                yazilarAlani.innerHTML = '<p style="text-align: center; color: #dc2743;">Yazılar yüklenirken bir sorun oluştu. Lütfen bağlantı ayarlarını kontrol et.</p>';
            }
        }

        // Sayfa yüklendiğinde yazıları getirme fonksiyonunu tetikle
        yazilariGetir();
    </script>
</body>
</html>
