<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav>
            <a href="index.html" class="logo">Burak Elmas <span class="logo-sub">- Kişisel Blog</span></a>

            <ul class="menu">
                <li><a href="index.html">Anasayfa</a></li>
                <li><a href="oyunlar.html">Oyunlar</a></li>
                <li><a href="kodlama.html">Kodlama</a></li>
                <li><a href="yazilarim.html">Yazılarım</a></li>
                <li><a href="bilisim-deposu.html" class="active">Bilişim Deposu</a></li>
                <li><a href="iletisim.html">İletişim</a></li>
                <li><button id="theme-toggle" class="theme-btn" title="Temayı Değiştir">🌙</button></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>Bilişim Deposu</h1>
            <p>Ders materyalleri, sunumlar ve çalışma kağıtları arşivi.</p>
        </section>

        <section class="file-manager">
            
            <div class="path-bar">
                <span>📍 Konum: </span>
                <span id="current-path" class="path-text">Dersler</span>
            </div>

            <div id="explorer-window" class="explorer-grid">
                </div>

        </section>
    </main>

    <footer>
        <p>&copy; 2026 Burak Elmas. Tüm hakları saklıdır.</p>
    </footer>

    <script>
// --- KLASÖR VE DOSYA SİSTEMİ ---
        const dosyaSistemi = {
            "Dersler": [
                { tip: "klasor", ad: "5. Sınıflar", hedef: "5. Siniflar" },
                { tip: "klasor", ad: "6. Sınıflar", hedef: "6. Siniflar" }

            ],
            
            // --- 5. SINIFLAR ANA KLASÖRÜ ---
            "5. Siniflar": [
                { tip: "klasor", ad: "Ana Dizine Dön", hedef: "Dersler", ikon: "↩️" },
                { tip: "klasor", ad: "Mart-Son", hedef: "5. Siniflar - Mart-Son" },
                { tip: "klasor", ad: "Nisan-1", hedef: "5. Siniflar - Nisan-1" },
                { tip: "klasor", ad: "Nisan-2", hedef: "5. Siniflar - Nisan-2" },
                { tip: "klasor", ad: "Nisan-3", hedef: "5. Siniflar - Nisan-3" }
        
            ],
            
            // --- 6. SINIFLAR ANA KLASÖRÜ ---
            "6. Siniflar": [
                { tip: "klasor", ad: "Ana Dizine Dön", hedef: "Dersler", ikon: "↩️" },
                { tip: "klasor", ad: "Mart-Son", hedef: "6. Siniflar - Mart-Son" },
                { tip: "klasor", ad: "Nisan-1", hedef: "6. Siniflar - Nisan-1" },
                { tip: "klasor", ad: "Nisan-2", hedef: "6. Siniflar - Nisan-2" },
                { tip: "klasor", ad: "Nisan-3", hedef: "6. Siniflar - Nisan-3" }
            ],

            

            // --- YENİ EKLENEN ALT KLASÖRLERİN İÇERİKLERİ ---
            // Bu klasörlere şimdilik sadece "Geri Dön" butonu ekledik. Kendi ders materyallerini buralara yerleştirebilirsin.
            
            "5. Siniflar - Mart-Son": [ { tip: "klasor", ad: "Üst Klasöre Dön", hedef: "5. Siniflar", ikon: "↩️" },
                { tip: "dosya", ad: "Problem-Belirleme-ve-Algoritma-Olusturma-1.pdf", url: "dersler/5_sinif/Problem-Belirleme-ve-Algoritma-Olusturma-1.pdf" },
                { tip: "dosya", ad: "problem çözme oyunu.pptx", url: "dersler/5_sinif/problem çözme oyunu.pptx" },
                { tip: "dosya", ad: "2.Dönem 2. Hafta Problem Çözme Stratejileri.pptx", url: "dersler/5_sinif/2.Dönem 2. Hafta Problem Çözme Stratejileri.pptx" },
                { tip: "dosya", ad: "2. Dönem 1. Hafta Problem.pptx", url: "dersler/5_sinif/2. Dönem 1. Hafta Problem.pptx" }
 ],
            "5. Siniflar - Nisan-1": [ { tip: "klasor", ad: "Üst Klasöre Dön", hedef: "5. Siniflar", ikon: "↩️" } ],
            "5. Siniflar - Nisan-2": [ { tip: "klasor", ad: "Üst Klasöre Dön", hedef: "5. Siniflar", ikon: "↩️" } ],
            "5. Siniflar - Nisan-3": [ { tip: "klasor", ad: "Üst Klasöre Dön", hedef: "5. Siniflar", ikon: "↩️" } ],

            "6. Siniflar - Mart-Son": [ { tip: "klasor", ad: "Üst Klasöre Dön", hedef: "6. Siniflar", ikon: "↩️" } ],
            "6. Siniflar - Nisan-1": [ { tip: "klasor", ad: "Üst Klasöre Dön", hedef: "6. Siniflar", ikon: "↩️" } ],
            "6. Siniflar - Nisan-2": [ { tip: "klasor", ad: "Üst Klasöre Dön", hedef: "6. Siniflar", ikon: "↩️" } ],
            "6. Siniflar - Nisan-3": [ { tip: "klasor", ad: "Üst Klasöre Dön", hedef: "6. Siniflar", ikon: "↩️" } ]
        };

        const explorerWindow = document.getElementById('explorer-window');
        const currentPathText = document.getElementById('current-path');

        // Uzantıya göre uygun emojiyi seçen fonksiyon
        function getDosyaIkonu(dosyaAdi) {
            const ad = dosyaAdi.toLowerCase();
            if (ad.endsWith('.pdf')) return '📕'; 
            if (ad.endsWith('.pptx') || ad.endsWith('.ppt')) return '📊'; 
            if (ad.endsWith('.docx') || ad.endsWith('.doc')) return '📝'; 
            if (ad.endsWith('.xlsx') || ad.endsWith('.xls')) return '📈'; 
            if (ad.endsWith('.zip') || ad.endsWith('.rar')) return '🗂️'; 
            if (ad.endsWith('.png') || ad.endsWith('.jpg') || ad.endsWith('.jpeg')) return '🖼️'; 
            return '📄'; 
        }

        // Klasör içeriğini ekrana çizen fonksiyon
        function klasoruAc(klasorAdi) {
            explorerWindow.innerHTML = ''; 
            currentPathText.innerText = klasorAdi; 

            const icerikler = dosyaSistemi[klasorAdi];

            icerikler.forEach(oge => {
                const itemDiv = document.createElement('div');
                itemDiv.classList.add('explorer-item');

                if (oge.tip === "klasor") {
                    itemDiv.innerHTML = `
                        <div class="item-icon">${oge.ikon ? oge.ikon : '📁'}</div>
                        <div class="item-name">${oge.ad}</div>
                    `;
                    itemDiv.onclick = () => klasoruAc(oge.hedef); 
                } else if (oge.tip === "dosya") {
                    const dosyaIkonu = getDosyaIkonu(oge.ad);
                    itemDiv.innerHTML = `
                        <div class="item-icon">${dosyaIkonu}</div>
                        <div class="item-name">${oge.ad}</div>
                        <a href="${oge.url}" download class="item-download" title="İndir">⬇️</a>
                    `;
                }

                explorerWindow.appendChild(itemDiv);
            });
        }

        // Başlangıçta ana dizini aç
        klasoruAc("Dersler");
// --- Karanlık Mod Scripti ---
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;
        
        // Sayfa yüklendiğinde eski tercihi kontrol et
        if (localStorage.getItem('theme') === 'dark') {
            body.classList.add('dark-mode');
            themeToggle.innerHTML = '☀️';
        }

        // Butona tıklandığında temayı değiştir
        themeToggle.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            if (body.classList.contains('dark-mode')) {
                localStorage.setItem('theme', 'dark');
                themeToggle.innerHTML = '☀️';
            } else {
                localStorage.setItem('theme', 'light');
                themeToggle.innerHTML = '🌙';
            }
        });

                </script>
</body>
</html>
